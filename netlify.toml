[build]
  command = "npm install --legacy-peer-deps && node --input-type=module node_modules/vite/bin/vite.js build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"
  NPM_FLAGS = "--legacy-peer-deps"
  NETLIFY_USE_X64 = "true"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
