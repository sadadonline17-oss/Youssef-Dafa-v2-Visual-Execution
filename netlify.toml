[build]
  command = "npm install --legacy-peer-deps command = "npm install --legacy-peer-deps && npm run build"command = "npm install --legacy-peer-deps && npm run build" ./node_modules/.bin/vite build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20.19.0"
  NPM_FLAGS = "--legacy-peer-deps"
  NETLIFY_USE_X64 = "true"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
